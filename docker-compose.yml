services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
  celery:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A app.tasks worker -B -l info
    environment:
      - REDIS_URL=redis://redis:6379/0
  postgres:
    image: postgres:16.14
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
  redis:
    image: redis:8.4
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
    restart: unless-stopped
    ports:
      - "6666:6379"